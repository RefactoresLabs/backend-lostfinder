name: Backend CI (Validation)

on:
  push:
    branches: [ "test/pr", "main" ]
  pull_request:
    branches: [ "test/pr" ]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 bandit pytest

      - name: Lint with Flake8 (Code Style)
        run: |
          # Para o build se houver erros de sintaxe Python ou variáveis não definidas
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Avisos de estilo (opcional: não quebra o build, mas avisa)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Security Scan (Bandit)
        run: |
          bandit -r . -x ./tests

      - name: Run Unit Tests
        run: |
          if [ -d "tests" ] || ls test_*.py 1> /dev/null 2>&1; then
            pytest
          else
            echo "Nenhum teste encontrado para executar."
          fi

  docker-build:
    needs: quality-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Dockerfile Build
        run: |
          # Testa se o Dockerfile está funcional antes de tentar o push para o ECR
          docker build . -t backend-lostfinder:test
          echo "Imagem buildada com sucesso!"
