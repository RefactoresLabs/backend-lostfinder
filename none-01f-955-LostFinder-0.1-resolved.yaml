components:
  schemas:
    RegisterUserRequest:
      required:
      - confirm_password
      - email
      - name
      - password
      - phone
      type: object
      properties:
        name:
          type: string
          example: Link
        email:
          type: string
          example: linkthehylian@email.com
        password:
          type: string
          format: password
          example: ruppees123
        confirm_password:
          type: string
          format: password
          example: ruppees123
        phone:
          type: string
          example: "12345678"
    LoginRequest:
      required:
      - email
      - password
      type: object
      properties:
        email:
          type: string
          example: linkthehylian@email.com
        password:
          type: string
          format: password
          example: ruppees123
    CreateLostItemRequest:
      required:
      - category_id
      - lost_building_space_id
      - name
      type: object
      properties:
        name:
          type: string
          example: Master Sword
        description:
          type: string
          example: "Espada prateada, com cabo azul e gema amarela"
        image_urls:
          type: array
          items:
            type: string
            example: /static/master_sword.png
        category_id:
          type: integer
          example: 1
        lost_building_space_id:
          type: integer
          example: 1
    CreateFoundItemRequest:
      required:
      - category_id
      - found_building_space_id
      - left_building_space_id
      - name
      type: object
      properties:
        name:
          type: string
          example: Master Sword
        description:
          type: string
          example: "Espada prateada, com cabo azul e gema amarela"
        image_urls:
          type: array
          items:
            type: string
            example: /static/master_sword.png
        category_id:
          type: integer
          example: 1
        found_building_space_id:
          type: integer
          example: 1
        left_building_space_id:
          type: integer
          example: 1
    ListLostItemsSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Master Sword
        user:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_user"
        category:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_category"
        lost_building_space:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_lost_building_space"
        image:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_image"
    ListFoundItemsSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Master Sword
        user:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_user"
        category:
          $ref: "#/components/schemas/ListLostItemsSummaryResponse_category"
        found_building_space:
