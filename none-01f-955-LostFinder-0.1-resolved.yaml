openapi: 3.0.0
info:
  title: LostFinder
  description: API para um sistema de achados e perdidos de universidade
  version: "0.1"
servers:
- url: https://virtserver.swaggerhub.com/none-01f-955/LostFinder/0.1
  description: SwaggerHub API Auto Mocking
paths:
  /users:
    description: Esse caminho representa uma coleção de recursos correspondente ao usuário do sistema
    post:
      tags:
      - Usuários
      description: Adiciona um novo usuário ao sistema
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequest"
      responses:
        "201":
          description: Usuário cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                message: Conta de usuário registrada com sucesso
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                empty_field:
                  description: Algum campo obrigatório está vazio
                  value:
                    message: Campo email está vazio
                    code: EMPTY_FIELD_ERROR
                    field: email
                required_field_missing:
                  description: Campos obrigatórios não informados
                  value:
                    message: Campos obrigatórios não informados
                    code: REQUIRED_FIELD_MISSING_ERROR
                password_mismatch:
                  description: Senha e confirmar senha não correspondem
                  value:
                    message: Senha e confirmar senha não correspondem
                    code: PASSWORD_MISMATCH_ERROR
        "409":
          description: E-mail já existente
          content:
            aplication/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Email já cadastrado
                code: EMAIL_ALREADY_EXISTS_ERROR
  /users/{user_id}:
    description: Esse caminho representa um recurso de conta de usuário
    get:
      tags:
      - Usuários
      description: Obtém os dados de uma conta de usuário
      parameters:
      - name: user_id
        in: path
        description: ID da conta de usuário
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Conta de usuário obtida com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserDetailsResponse"
        "401":
          description: Token de acesso inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                expired_signature_error:
                  description: Token expirado
                  value:
                    message: Token expirado
                    code: EXPIRED_SIGNATURE_ERROR
                invalid_token_error:
                  description: Token inválido
                  value:
                    message: Token inválido
                    code: INVALID_TOKEN_ERROR
                token_not_provided:
                  description: Token não informado
                  value:
                    message: Token de autenticação não informado
                    code: TOKEN_NOT_PROVIDED
        "404":
          description: Conta de usuário não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Conta de usuário não encontrada
                code: USER_ACCOUNT_DOESNT_EXIST_ERROR
      security:
      - bearerAuth: []
    patch:
      tags:
      - Usuários
      description: Atualiza os dados de uma conta de usuário
      parameters:
      - name: user_id
        in: path
        description: ID da conta de usuário
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Conta de usuário atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                message: Conta de usuário atualizada com sucesso
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                password_mismatch:
                  description: Senha e confirmar senha não correspondem
                  value:
                    message: Senha e confirmar senha não correspondem
                    code: PASSWORD_MISMATCH_ERROR
        "401":
          description: Token de acesso inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                expired_signature_error:
                  description: Token expirado
                  value:
                    message: Token expirado
                    code: EXPIRED_SIGNATURE_ERROR
                invalid_token_error:
                  description: Token inválido
                  value:
                    message: Token inválido
                    code: INVALID_TOKEN_ERROR
                token_not_provided:
                  description: Token não informado
                  value:
                    message: Token de autenticação não informado
                    code: TOKEN_NOT_PROVIDED
        "404":
          description: Conta de usuário não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                message: Conta de usuário não encontrada
                code: USER_ACCOUNT_DOESNT_EXIST_ERROR
      security:
      - bearerAuth: []
  /login:
    description: Esse caminho representa o processo de autenticação do sistema
    post:
      tags:
      - Autenticação
      description: "Fornece um token que autoriza o usuário a acessar o sistema, a partir de credenciais válidas"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Autenticação feita com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                empty_field:
                  description: Algum campo obrigatório está vazio
                  value:
                    message: Campo email está vazio
                    code: EMPTY_FIELD_ERROR
                    field: email
                required_field_missing:
                  description: Campos obrigatórios não informados
                  value:
                    message: Campos obrigatórios não informados
                    code: REQUIRED_FIELD_MISSING_ERROR
        "401":
